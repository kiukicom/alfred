services:
  alfred:
    # Use the published image by default; override with `build: .` for local dev
    image: ghcr.io/clerkboard/alfred:latest
    ports:
      - "3141:3141"
    volumes:
      - ./alfred.yaml:/config/alfred.yaml:ro
      - alfred-data:/app/data
    environment:
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - GEMINI_API_KEY
    restart: unless-stopped

volumes:
  alfred-data:
